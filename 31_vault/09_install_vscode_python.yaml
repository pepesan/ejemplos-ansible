---
- name: Install VS Code (GUI) + Python extensions
  hosts: ubuntu
  become: true

  vars:
    dev_user: alumno

    vscode_extensions:
      - ms-python.python
      - ms-python.vscode-pylance
      - ms-toolsai.jupyter
      - ms-python.black-formatter

    vscode_deb_url: "https://code.visualstudio.com/sha/download?build=stable&os=linux-deb-x64"
    vscode_deb_path: "/tmp/vscode.deb"

    python_packages:
      - python3
      - python3-pip
      - python3-venv
      - python3-dev
      - ca-certificates
      - curl
      - git

  tasks:
    - name: Ensure base Python and utility packages
      ansible.builtin.apt:
        name: "{{ python_packages }}"
        state: present
        update_cache: true

    - name: Download VS Code .deb
      ansible.builtin.get_url:
        url: "{{ vscode_deb_url }}"
        dest: "{{ vscode_deb_path }}"
        mode: "0644"

    - name: Install VS Code .deb
      ansible.builtin.apt:
        deb: "{{ vscode_deb_path }}"

    - name: Install VS Code extensions for Python as dev user
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.command: "code --install-extension {{ item }} --force"
      environment:
        HOME: "/home/{{ dev_user }}"
        USER: "{{ dev_user }}"
        LOGNAME: "{{ dev_user }}"
      register: ext_install
      changed_when: >
        'already installed' not in (ext_install.stdout | lower) and
        'already installed' not in (ext_install.stderr | lower)
      failed_when: >
        ext_install.rc != 0 and
        'already installed' not in (ext_install.stdout | lower) and
        'already installed' not in (ext_install.stderr | lower)
      loop: "{{ vscode_extensions }}"