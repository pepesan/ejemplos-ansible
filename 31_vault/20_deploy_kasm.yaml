---
- name: Comprobar conectividad con los hosts del grupo ubuntu
  hosts: ubuntu
  gather_facts: no
  vars:
    kasm_dir: /opt/kasm
    kasm_files_dir: "{{ playbook_dir }}/files/kasm"
    # Imagen Kasm a desplegar. Opciones disponibles:
    #   pepesan/mi-ubuntu-noble-kasm:1.0     -> Ubuntu 24.04 con IntelliJ, ZAP, Firefox (por defecto)
    #   pepesan/mi-ubuntu-noble-kasm-go:latest -> Entorno de desarrollo Go
    # Repositorio de imágenes personalizadas: https://github.com/pepesan/kasm-workspaces-images.git
    # Sobreescribir con: -e kasm_image=pepesan/mi-ubuntu-noble-kasm-go
    kasm_image: "pepesan/mi-ubuntu-noble-kasm:1.0"
    kasm_version: "1.19.0"
    kasm_domain: "{{ node_name }}.kasm.cursosdedesarrollo.com"
  tasks:
    - name: Crear directorio de Kasm
      file:
        path: "{{ kasm_dir }}"
        state: directory
        mode: '0755'

    - name: Copiar ficheros de Kasm
      copy:
        src: "{{ kasm_files_dir }}/"
        dest: "{{ kasm_dir }}/"
        mode: preserve
    ## Para evitar el fallo de la swap en la instalación de Kasm, vamos a crear un swapfile de 4GB si no existe
    - name: Comprobar si existe swapfile
      stat:
        path: /swapfile
      register: swapfile

    - name: Crear swapfile de 4GB
      command: fallocate -l 4G /swapfile
      when: not swapfile.stat.exists

    - name: Establecer permisos del swapfile
      file:
        path: /swapfile
        mode: '0600'
      when: not swapfile.stat.exists

    - name: Formatear swapfile
      command: mkswap /swapfile
      when: not swapfile.stat.exists

    - name: Activar swapfile
      command: swapon /swapfile
      when: not swapfile.stat.exists

    - name: Hacer swap permanente en fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile none swap sw 0 0'
        state: present

    - name: Lanzar contenedor Kasm con docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ kasm_dir }}"
        files:
          - compose.yaml
        state: present

    - name: Tip — seguir log de instalación en tiempo real
      debug:
        msg: "Para ver el progreso ejecuta en otra terminal: ssh root@{{ inventory_hostname }} 'tail -f /opt/kasm/data/opt/kasm_deploy.log'"

    - name: Ejecutar fix e instalación de Kasm
      community.docker.docker_container_exec:
        container: kasm
        command: bash /scripts/fix_and_install_kasm.sh
        env:
          KASM_ADMIN_PASSWORD: "{{ kasm_admin_password }}"
          KASM_USER_PASSWORD: "{{ kasm_user_password }}"
      register: install_output

    - name: Mostrar resultado de instalación
      debug:
        var: install_output.stdout

    - name: Configurar tiempos de workspace y deshabilitar pruning agresivo
      command: bash /opt/kasm/09_configure_session_limits.sh
      register: session_output

    - name: Mostrar resultado de configuración de sesión
      debug:
        var: session_output.stdout

    - name: Descargar imagen personalizada en el DinD de Kasm
      command: docker exec kasm docker pull {{ kasm_image }}
      async: 1800
      poll: 30

    - name: Etiquetar imagen con tag :1.0 en el DinD de Kasm
      command: docker exec kasm docker tag {{ kasm_image }} {{ kasm_image.split(':')[0] }}:1.0

    - name: Configurar workspace personalizado
      command: bash /opt/kasm/08_automatic_workspace_configure.sh
      environment:
        KASM_IMAGE: "{{ kasm_image }}"
      register: workspace_output

    - name: Mostrar resultado de configuración del workspace
      debug:
        var: workspace_output.stdout

    - name: Mostrar resultado de configuración del session
      debug:
        var: session_output.stdout

    - name: Instalar bloqueo de impresión en nginx de kasm_proxy
      copy:
        src: "{{ kasm_files_dir }}/nginx/print_block.conf"
        dest: "{{ kasm_dir }}/data/opt/kasm/{{ kasm_version }}/conf/nginx/containers.d/print_block.conf"
        mode: '0644'

    - name: Recargar nginx de kasm_proxy
      command: docker exec kasm docker exec kasm_proxy nginx -s reload

# Entra a https://IP_SERVIDOR/ para acceder a Kasm, el usuario es "admin@kasm.local" y la contraseña "Admin1234!"